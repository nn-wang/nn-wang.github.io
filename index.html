<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ningning Wang | Academic Homepage</title>
  <meta name="description" content="Ningning Wang's personal academic homepage." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260720c" />
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="container">
    <span class="nav-name" id="nav-name"></span>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#journey">Journey</a></li>
      <li><a href="#news">News</a></li>
      <li><a href="#publications">Publications</a></li>
    </ul>
  </div>
</nav>

<!-- Profile -->
<section class="profile" id="about">
  <div class="container">
    <div class="profile-inner">
      <div class="profile-photo-wrapper">
        <img class="profile-photo" id="profile-photo" src="" alt="Profile photo" />
      </div>
      <div class="profile-info">
        <h1 id="profile-name"></h1>
        <p class="profile-subtitle" id="profile-subtitle"></p>
        <div class="social-links" id="social-links"></div>
      </div>
    </div>
    <div class="profile-full">
      <p class="profile-bio" id="profile-bio"></p>
      <div class="profile-interests">
        <span class="profile-interests-label">Research Interests</span>
        <div class="research-interests" id="research-interests"></div>
      </div>
    </div>
  </div>
</section>

<!-- Academic Journey -->
<section class="section" id="journey">
  <div class="container">
    <h2 class="section-title">Academic Journey</h2>
    <div class="timeline" id="timeline"></div>
  </div>
</section>

<!-- News -->
<section class="section" id="news">
  <div class="container">
    <h2 class="section-title">News</h2>
    <ul class="news-list" id="news-list"></ul>
  </div>
</section>

<!-- Publications -->
<section class="section" id="publications">
  <div class="container">
    <div class="section-heading">
      <h2 class="section-title">Selected Publications</h2>
      <a class="view-all-link" href="publications.html">View all <span aria-hidden="true">→</span></a>
    </div>
    <p class="author-legend">* Equal contribution · † Corresponding author · ‡ Project leader</p>
    <div class="pub-list" id="pub-list"></div>
  </div>
</section>

<!-- Footer -->
<footer>
  <div class="container">
    <p id="footer-text"></p>
  </div>
</footer>

<script src="data.js?v=20260720b"></script>
<script>
(function () {
  const d = siteData;

  document.getElementById("nav-name").textContent = d.profile.name;
  document.getElementById("profile-photo").src = d.profile.photo;
  document.getElementById("profile-photo").alt = d.profile.name;
  document.getElementById("profile-name").textContent = d.profile.name;
  document.getElementById("profile-subtitle").textContent =
    d.profile.title + " at " + d.profile.affiliation;
  document.getElementById("profile-bio").innerHTML = d.profile.bio;

  const socialEl = document.getElementById("social-links");
  d.socialLinks.forEach((s) => {
    const a = document.createElement("a");
    a.className = "social-link";
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.title = s.name;
    const img = document.createElement("img");
    img.src = s.icon;
    img.alt = s.name;
    a.appendChild(img);
    socialEl.appendChild(a);
  });

  const interestsEl = document.getElementById("research-interests");
  d.researchInterests.forEach((r) => {
    const span = document.createElement("span");
    span.className = "interest-tag";
    span.textContent = r;
    interestsEl.appendChild(span);
  });

  const timelineEl = document.getElementById("timeline");
  d.academicJourney.forEach((j) => {
    const item = document.createElement("div");
    item.className = "timeline-item";
    item.innerHTML = `
      <div class="timeline-institution">${j.institution}</div>
      <div class="timeline-degree">${j.degree}</div>
      <div class="timeline-meta">
        <span class="timeline-period">${j.period}</span>
        ${j.status ? `<span class="timeline-status">${j.status}</span>` : ""}
      </div>
    `;
    timelineEl.appendChild(item);
  });

  const newsEl = document.getElementById("news-list");
  if (d.news.length === 0) {
    newsEl.innerHTML =
      '<div class="empty-placeholder">News will be updated here. Stay tuned!</div>';
  } else {
    d.news.forEach((n) => {
      const li = document.createElement("li");
      li.className = "news-item";
      li.innerHTML = `
        <span class="news-date">${n.date}</span>
        <span class="news-content">${n.content}</span>
      `;
      newsEl.appendChild(li);
    });
  }

  const pubEl = document.getElementById("pub-list");
  if (d.publications.length === 0) {
    pubEl.innerHTML =
      '<div class="empty-placeholder">Publications will be listed here.</div>';
  } else {
    d.publications.forEach((p) => {
      const div = document.createElement("div");
      div.className = "pub-item";

      const links = (p.links || [])
        .map(
          (l) =>
            `<a class="pub-link" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
        )
        .join('<span class="pub-link-separator">·</span>');

      const authorsHtml = (p.authors || "").replace(
        /Ningning Wang/g,
        '<span class="self">Ningning Wang</span>'
      );

      const thumbHtml = p.image
        ? `<div class="pub-visual"><img class="pub-thumb" src="${p.image}" alt="${p.title}" loading="lazy" /></div>`
        : `<div class="pub-visual pub-visual-placeholder" aria-hidden="true"></div>`;

      div.innerHTML = `
        ${thumbHtml}
        <div class="pub-body">
          <div class="pub-primary">
            <div class="pub-title">${p.title}</div>
            <div class="pub-venue-inline">${p.venue}</div>
          </div>
          <div class="pub-secondary">
            <div class="pub-authors">${authorsHtml}</div>
            ${links ? `<div class="pub-links">${links}</div>` : ""}
          </div>
        </div>
      `;
      pubEl.appendChild(div);
    });
  }

  document.getElementById("footer-text").textContent = d.footer.text;
})();
</script>

</body>
</html>
